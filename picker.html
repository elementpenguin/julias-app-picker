<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://apis.google.com/js/platform.js?onload=initPicker" async defer></script>
    <script>
        function initPicker() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const apiKey = urlParams.get('apiKey');
            const appId = urlParams.get('appId');

            gapi.load('picker', function() {
                var picker = new google.picker.PickerBuilder()
                    .addView(google.picker.ViewId.SPREADSHEETS)
                    .setOAuthToken(token)
                    .setAppId(appId)
                    .setDeveloperKey(apiKey)
                    .setCallback(pickerCallback)
                    .build();
                picker.setVisible(true);
            });
        }

        function pickerCallback(data) {
            if (data.action == google.picker.Action.PICKED) {
                var doc = data.docs[0];
                window.webkit.messageHandlers.pickerBridge.postMessage({
                    action: "picked",
                    fileId: doc.id
                });
            } else if (data.action == google.picker.Action.CANCELLED) {
                window.webkit.messageHandlers.pickerBridge.postMessage({ action: "cancelled" });
            }
        }
    </script>
</head>
<body style="margin:0; padding:0;"></body>
</html>
